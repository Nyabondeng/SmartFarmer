<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes">
    <title>Smart Farmer - Contact</title>
    <link rel="stylesheet" href="styles/contact.css">
</head>
<body>
    <header>
        <h1>🌽 Smart Farmer</h1>
        <p>Get in touch</p>
    </header>

    <nav>
        <a href="index.html">Home</a>
        <a href="about.html">About</a>
        <a href="crops.html">Crop Info</a>
        <a href="education.html">Education</a>
        <a href="crop-log.html">Crop Log</a>
        <a href="community.html">Community</a>
        <a href="contact.html">Contact</a>
    </nav>

    <main>
        <h2>Contact Us</h2>
        <p>Have questions or feedback? Reach out to us.</p>

        <form id="contactForm">
            <label for="name">Your Name:</label>
            <input type="text" id="name" required>

            <label for="email">Your Email or Phone:</label>
            <input type="text" id="email" required>

            <label for="message">Message:</label>
            <textarea id="message" rows="4" required></textarea>

            <button type="submit">Send Message</button>
        </form>
        <p id="formStatus"></p>

        <div class="other-contacts">
            <h3>Other Ways to Reach Us</h3>
            <p>📧 Email: smartfarmer@example.com</p>
            <p>📱 Coming soon: USSD code *131#</p>
        </div>
    </main>

    <footer>
        <p>&copy; 2026 Smart Farmer. For smallholder farmers in South Sudan.</p>
    </footer>

    <script src="script.js"></script>
</body>
</html>
