<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Offline - Smart Farmer</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: #f5f7f5;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }
        .offline-container {
            text-align: center;
            max-width: 500px;
            padding: 40px;
            background: white;
            border-radius: 20px;
            box-shadow: 0 10px 40px rgba(0,0,0,0.1);
        }
        .offline-icon { font-size: 80px; margin-bottom: 20px; }
        h1 { color: #1E6A33; margin-bottom: 15px; }
        p { color: #666; margin-bottom: 20px; line-height: 1.6; }
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: #1E6A33;
            color: white;
            text-decoration: none;
            border-radius: 8px;
            font-weight: 600;
            transition: 0.3s;
        }
        .btn:hover { background: #145124; }
        .tips {
            text-align: left;
            margin-top: 20px;
            padding: 15px;
            background: #f0f8f0;
            border-radius: 10px;
        }
        .tips ul { list-style: none; padding: 0; margin-top: 10px; }
        .tips li { margin: 8px 0; color: #333; font-size: 14px; }
    </style>
</head>
<body>
    <div class="offline-container">
        <div class="offline-icon">📡</div>
        <h1>You Are Offline</h1>
        <p>Smart Farmer works without internet. Some features may be limited.</p>
        <button class="btn" onclick="location.reload()">Try Again</button>
        <div class="tips">
            <strong>What you can still do offline:</strong>
            <ul>
                <li>✅ View saved crop information</li>
                <li>✅ Save planting records</li>
                <li>✅ Access already opened modules</li>
                <li>✅ Use the crop log</li>
            </ul>
        </div>
    </div>
</body>
</html>
